global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: 'corvus'
    static_configs:
      - targets: ['host.docker.internal:9090']
    metrics_path: '/metrics'

  - job_name: 'op-geth'
    static_configs:
      - targets: ['host.docker.internal:6060']
    metrics_path: '/debug/metrics/prometheus'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []
